server {
    listen 80;
    listen [::]:80;
    server_name lms-api.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lms-api.example.com;

    ssl_certificate /etc/letsencrypt/live/lms-api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lms-api.example.com/privkey.pem;

    client_max_body_size 50m;

    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /readyz {
        access_log off;
        proxy_pass http://127.0.0.1:8000/readyz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    location /static/ {
        alias /srv/LMS/lms_backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/LMS/lms_backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
